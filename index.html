<!DOCTYPE html>
<html>
<head>
  <title>AI Creator Myanmar</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    .box { margin: 30px 0; }
    img, video { max-width: 300px; margin-top: 15px; }
  </style>
</head>
<body>

  <h1>🔥 AI Creator Myanmar</h1>

  <div class="box">
    <h2>🖼 Text → Image</h2>
    <input type="text" placeholder="Enter prompt">
    <button>Generate</button>
  </div>

  <div class="box">
    <h2>🎬 Image → Video</h2>
    <input type="file">
    <button>Animate</button>
  </div>

</body>
</html>
